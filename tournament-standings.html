<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tournament Standings | Pinnacle SMP</title>
  <style>
    :root {
      --text: #eef3ff;
      --muted: #c2cdea;
      --panel: rgba(24, 33, 52, 0.86);
      --line: rgba(156, 191, 236, 0.35);
      --gold: #ffd66b;
      --silver: #dbe8ff;
      --bronze: #ffb27a;
      --accent: #57d5ff;
      --green: #5fff9c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      background: #0f1420;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -18px;
      z-index: -2;
      pointer-events: none;
      background: url("assets/branding/MCV_SPR26Drop_TT_DotNet_Wallpaper_2560x1440.svg") center / cover no-repeat fixed;
      filter: blur(7px) brightness(0.48) saturate(1.1);
      transform: scale(1.03);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(circle at top left, rgba(116, 232, 255, 0.2), transparent 33%),
        radial-gradient(circle at top right, rgba(146, 255, 198, 0.2), transparent 30%),
        linear-gradient(180deg, rgba(12, 17, 28, 0.82) 0%, rgba(11, 16, 24, 0.9) 100%);
    }

    .container {
      width: min(calc(100% - 32px), 1100px);
      margin: 0 auto;
      padding: 36px 0 54px;
    }

    .back-link {
      display: inline-flex;
      margin-bottom: 16px;
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 26px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.45);
      margin-bottom: 20px;
    }

    h1, h2 {
      margin: 0 0 14px;
      letter-spacing: -0.03em;
    }

    h1 { font-size: clamp(1.9rem, 5vw, 2.8rem); }
    h2 { font-size: clamp(1.5rem, 4vw, 2.1rem); }

    .frame-wrap {
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid rgba(87, 213, 255, 0.3);
      background: rgba(11, 16, 24, 0.75);
    }

    .scoreboard {
      display: grid;
      gap: 12px;
    }

    .entry {
      border: 1px solid rgba(156, 191, 236, 0.24);
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(11, 16, 24, 0.68);
    }

    .entry-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-weight: 700;
    }

    .name {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 1rem;
    }

    .pts {
      color: var(--green);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .bar {
      margin-top: 8px;
      height: 9px;
      width: 100%;
      border-radius: 999px;
      background: rgba(194, 205, 234, 0.2);
      overflow: hidden;
    }

    .fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #57d5ff 0%, #5fff9c 100%);
    }

    .entry[data-rank="1"] {
      border-color: rgba(255, 214, 107, 0.6);
      box-shadow: 0 0 0 1px rgba(255, 214, 107, 0.25) inset;
    }

    .entry[data-rank="2"] {
      border-color: rgba(219, 232, 255, 0.5);
      box-shadow: 0 0 0 1px rgba(219, 232, 255, 0.2) inset;
    }

    .entry[data-rank="3"] {
      border-color: rgba(255, 178, 122, 0.45);
      box-shadow: 0 0 0 1px rgba(255, 178, 122, 0.2) inset;
    }

    .medal.gold { color: var(--gold); }
    .medal.silver { color: var(--silver); }
    .medal.bronze { color: var(--bronze); }
  </style>
</head>
<body>
  <main class="container">
    <a href="index.html" class="back-link">← Back to home</a>

    <section class="section">
      <h1>Current Tournament</h1>
      <div class="frame-wrap">
        <iframe src="https://challonge.com/6dk8cz7n/module" width="100%" height="500" frameborder="0" scrolling="auto" allowtransparency="true"></iframe>
      </div>
    </section>

    <section class="section">
      <h2>Tournament Standings</h2>
      <div class="scoreboard">
        <article class="entry" data-rank="1">
          <div class="entry-head">
            <span class="name"><span class="medal gold">🥇</span> McCreeper1318</span>
            <span class="pts">10 pts</span>
          </div>
          <div class="bar"><div class="fill" style="width: 100%"></div></div>
        </article>

        <article class="entry" data-rank="2">
          <div class="entry-head">
            <span class="name"><span class="medal silver">🥈</span> BadFiction</span>
            <span class="pts">5 pts</span>
          </div>
          <div class="bar"><div class="fill" style="width: 50%"></div></div>
        </article>

        <article class="entry" data-rank="3">
          <div class="entry-head">
            <span class="name"><span class="medal bronze">🥉</span> Atlaskytan</span>
            <span class="pts">4 pts</span>
          </div>
          <div class="bar"><div class="fill" style="width: 40%"></div></div>
        </article>

        <article class="entry" data-rank="3">
          <div class="entry-head">
            <span class="name"><span class="medal bronze">🥉</span> Poplare (Shiny)</span>
            <span class="pts">4 pts</span>
          </div>
          <div class="bar"><div class="fill" style="width: 40%"></div></div>
        </article>

        <article class="entry">
          <div class="entry-head">
            <span class="name">StirfrySurprise</span>
            <span class="pts">3 pts</span>
          </div>
          <div class="bar"><div class="fill" style="width: 30%"></div></div>
        </article>

        <article class="entry">
          <div class="entry-head">
            <span class="name">kylethecaver</span>
            <span class="pts">3 pts</span>
          </div>
          <div class="bar"><div class="fill" style="width: 30%"></div></div>
        </article>

        <article class="entry">
          <div class="entry-head">
            <span class="name">mermaidxellie</span>
            <span class="pts">2 pts</span>
          </div>
          <div class="bar"><div class="fill" style="width: 20%"></div></div>
        </article>

        <article class="entry">
          <div class="entry-head">
            <span class="name">Nicholatte</span>
            <span class="pts">2 pts</span>
          </div>
          <div class="bar"><div class="fill" style="width: 20%"></div></div>
        </article>

        <article class="entry">
          <div class="entry-head">
            <span class="name">BeansUniverse</span>
            <span class="pts">2 pts</span>
          </div>
          <div class="bar"><div class="fill" style="width: 20%"></div></div>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
