<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | Pinnacle SMP</title>
    <link rel="stylesheet" href="assets/light-theme.css" />
  <style>
    :root {      --line: rgba(168, 208, 255, 0.4);
      --green: #7affb4;
      --cyan: #72e0ff;
      --radius: 20px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      background: var(--bg-soft);
    }

    body::before {
      content: "";
      position: fixed;
      inset: -18px;
      z-index: -2;
      pointer-events: none;
      background: url("assets/branding/MCV_SPR26Drop_TT_DotNet_Wallpaper_2560x1440.svg") center / cover no-repeat fixed;
      filter: blur(7px) brightness(0.48) saturate(1.1);
      transform: scale(1.03);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(circle at top left, var(--overlay-top-left), transparent 33%),
        radial-gradient(circle at top right, var(--overlay-top-right), transparent 30%),
        linear-gradient(180deg, var(--overlay-base-start) 0%, var(--overlay-base-end) 100%);
    }
    .container {
      width: min(calc(100% - 32px), 860px);
      margin: 0 auto;
      padding: 36px 0 52px;
      background: var(--frosted-bg);
      border: 1px solid var(--frosted-line);
      border-radius: 26px;
      backdrop-filter: blur(8px);
    }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 28px; }
    h1 { margin: 0 0 10px; font-size: clamp(2rem, 4vw, 2.8rem); }
    p { color: var(--muted); line-height: 1.7; }
    .note { font-size: 0.95rem; margin: 0 0 22px; }
    form { display: grid; gap: 16px; }
    label { font-weight: 600; display: grid; gap: 8px; }
    input, textarea, select {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(122, 162, 255, 0.24);
      background: var(--input-bg);
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
    }
    textarea { min-height: 130px; resize: vertical; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
    .btn {
      border: 0;
      border-radius: 12px;
      min-height: 44px;
      padding: 0 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary { background: linear-gradient(135deg, var(--green), var(--cyan)); color: var(--text); }
    .btn-secondary { background: var(--btn-secondary-bg); color: var(--text); }
  </style>
</head>
<body>
  <main class="container">
    <div class="card">
      <h1>Contact Us</h1>
      <p>
        Use this contact form to open a GitHub issue with your message details for staff follow-up.
      </p>
      <p class="note">
        Maintainers: update <code>GITHUB_REPO</code> in this page if your repository path changes.
      </p>

      <form id="contact-form">
        <label>Your Name
          <input name="name" required />
        </label>

        <label>Preferred Contact (Discord, email, or both)
          <input name="contact" required placeholder="Example: user#1234 or you@email.com" />
        </label>

        <label>Topic
          <select name="topic" required>
            <option value="General Question">General Question</option>
            <option value="Staff Report">Staff Report</option>
            <option value="Partnership Request">Partnership Request</option>
            <option value="Technical Help">Technical Help</option>
            <option value="Other">Other</option>
          </select>
        </label>

        <label>Subject
          <input name="subject" required />
        </label>

        <label>Message
          <textarea name="message" required></textarea>
        </label>

        <div class="actions">
          <button class="btn btn-primary" type="submit">Submit to GitHub</button>
          <a class="btn btn-secondary" href="index.html">Back to Home</a>
        </div>
      </form>
    </div>
  </main>

  <script>
    const GITHUB_REPO = "mccreeper1318/pinnaclesmp";

    const form = document.getElementById("contact-form");
    form.addEventListener("submit", (event) => {
      event.preventDefault();

      if (GITHUB_REPO === "OWNER/REPO") {
        alert("Please configure GITHUB_REPO in contact-us.html before using this form.");
        return;
      }

      const data = new FormData(form);
      const value = (name) => (data.get(name) || "Not provided").toString().trim() || "Not provided";
      const title = `[Contact] ${value("subject")}`;
      const body = [
        "## Contact Form Submission",
        "",
        `- **Name:** ${value("name")}`,
        `- **Preferred Contact:** ${value("contact")}`,
        `- **Topic:** ${value("topic")}`,
        `- **Subject:** ${value("subject")}`,
        `- **Message:** ${value("message")}`
      ].join("\n");

      const url = `https://github.com/${GITHUB_REPO}/issues/new?title=${encodeURIComponent(title)}&body=${encodeURIComponent(body)}&labels=${encodeURIComponent("contact")}`;
      window.open(url, "_blank", "noopener");
    });
  </script>
</body>
</html>
