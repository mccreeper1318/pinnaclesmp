<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plugin Suggestions | Pinnacle SMP</title>
    <link rel="stylesheet" href="assets/light-theme.css" />
  <style>
    :root {      --line: rgba(168, 208, 255, 0.4);
      --green: #7affb4;
      --cyan: #72e0ff;
      --radius: 20px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      background: var(--bg-soft);
    }

    body::before {
      content: "";
      position: fixed;
      inset: -18px;
      z-index: -2;
      pointer-events: none;
      background: url("assets/branding/MCV_SPR26Drop_TT_DotNet_Wallpaper_2560x1440.svg") center / cover no-repeat fixed;
      filter: blur(7px) brightness(0.48) saturate(1.1);
      transform: scale(1.03);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(circle at top left, var(--overlay-top-left), transparent 33%),
        radial-gradient(circle at top right, var(--overlay-top-right), transparent 30%),
        linear-gradient(180deg, var(--overlay-base-start) 0%, var(--overlay-base-end) 100%);
    }
    .container {
      width: min(calc(100% - 32px), 860px);
      margin: 0 auto;
      padding: 36px 0 52px;
      background: var(--frosted-bg);
      border: 1px solid var(--frosted-line);
      border-radius: 26px;
      backdrop-filter: blur(8px);
    }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 28px; }
    h1 { margin: 0 0 10px; font-size: clamp(2rem, 4vw, 2.8rem); }
    p { color: var(--muted); line-height: 1.7; }
    .note { font-size: 0.95rem; margin: 0 0 22px; }
    form { display: grid; gap: 16px; }
    label { font-weight: 600; display: grid; gap: 8px; }
    input, textarea {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(122, 162, 255, 0.24);
      background: var(--input-bg);
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
    }
    textarea { min-height: 130px; resize: vertical; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
    .btn {
      border: 0;
      border-radius: 12px;
      min-height: 44px;
      padding: 0 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary { background: linear-gradient(135deg, var(--green), var(--cyan)); color: var(--text); }
    .btn-secondary { background: var(--btn-secondary-bg); color: var(--text); }
  

    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(16px);
      background: var(--nav-bg);
      border-bottom: 1px solid var(--btn-secondary-bg);
    }

    .nav-wrap {
      width: min(calc(100% - 32px), 1100px);
      margin: 0 auto;
      min-height: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--text);
      text-decoration: none;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand-logo {
      width: 44px;
      height: 44px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .menu-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid rgba(141, 181, 255, 0.34);
      background: var(--btn-secondary-bg);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .site-nav ul {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 11px;
      border: 1px solid rgba(122, 162, 255, 0.22);
      background: rgba(122, 162, 255, 0.11);
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .nav-link:hover,
    .nav-link:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(95, 255, 156, 0.42);
      background: var(--btn-secondary-hover);
      outline: none;
    }

    @media (max-width: 860px) {
      .nav-wrap {
        min-height: unset;
        padding: 12px 0;
        flex-wrap: wrap;
      }

      .menu-toggle {
        display: inline-flex;
      }

      .site-nav {
        width: 100%;
        display: none;
      }

      .site-header.nav-open .site-nav {
        display: block;
      }

      .site-nav ul {
        flex-direction: column;
        align-items: stretch;
      }

      .nav-link {
        width: 100%;
      }
    }

  </style>
</head>
<body>

  <header class="site-header">
    <div class="nav-wrap">
      <a href="index.html#home" class="brand">
        <img class="brand-logo" src="assets/branding/PinnacleSeason12Logo.svg" alt="Pinnacle SMP Season 12 logo" />
        <span>Pinnacle SMP</span>
      </a>
      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="mobile-nav">Menu</button>
      <nav class="site-nav" id="mobile-nav" aria-label="Main navigation">
        <ul>
          <li><a class="nav-link" href="index.html#home">Home</a></li>
          <li><a class="nav-link" href="index.html#news">Server News</a></li>
          <li><a class="nav-link" href="index.html#events">Events</a></li>
          <li><a class="nav-link" href="index.html#rules">Server Rules</a></li>
          <li><a class="nav-link" href="index.html#join">Join</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="card">
      <h1>Plugin Suggestions</h1>
      <p>
        Share plugin ideas that could improve the server. This form opens a GitHub issue pre-filled with your answers.
      </p>
      <p class="note">
        Maintainers: update <code>GITHUB_REPO</code> in this page if your repository path changes.
      </p>

      <form id="plugin-suggestion-form">
        <label>Your Name / Username
          <input name="submitter" placeholder="Optional" />
        </label>

        <label>Plugin Name
          <input name="plugin_name" required />
        </label>

        <label>Plugin Link
          <input name="plugin_link" type="url" placeholder="https://..." />
        </label>

        <label>What problem does this solve?
          <textarea name="problem" required></textarea>
        </label>

        <label>How should this plugin be configured for Pinnacle SMP?
          <textarea name="configuration" required></textarea>
        </label>

        <label>Main Benefits
          <textarea name="benefits" required></textarea>
        </label>

        <label>Potential Downsides / Risks
          <textarea name="risks"></textarea>
        </label>

        <div class="actions">
          <button class="btn btn-primary" type="submit">Submit to GitHub</button>
        </div>
      </form>
    </div>
  </main>

  <script>
    const GITHUB_REPO = "mccreeper1318/pinnaclesmp";

    const form = document.getElementById("plugin-suggestion-form");
    form.addEventListener("submit", (event) => {
      event.preventDefault();

      if (GITHUB_REPO === "OWNER/REPO") {
        alert("Please configure GITHUB_REPO in plugin-suggestions.html before using this form.");
        return;
      }

      const data = new FormData(form);
      const value = (name) => (data.get(name) || "Not provided").toString().trim() || "Not provided";
      const title = `[Plugin Suggestion] ${value("plugin_name")}`;
      const body = [
        "## Plugin Suggestion Form",
        "",
        `- **Submitter:** ${value("submitter")}`,
        `- **Plugin Name:** ${value("plugin_name")}`,
        `- **Plugin Link:** ${value("plugin_link")}`,
        `- **What problem does this solve?:** ${value("problem")}`,
        `- **How should this be configured?:** ${value("configuration")}`,
        `- **Main benefits:** ${value("benefits")}`,
        `- **Potential downsides / risks:** ${value("risks")}`
      ].join("\n");

      const url = `https://github.com/${GITHUB_REPO}/issues/new?title=${encodeURIComponent(title)}&body=${encodeURIComponent(body)}&labels=${encodeURIComponent("plugin-suggestion")}`;
      window.open(url, "_blank", "noopener");
    });
  </script>

  <script>
    (() => {
      const header = document.querySelector('.site-header');
      const toggle = document.querySelector('.menu-toggle');
      const nav = document.getElementById('mobile-nav');
      if (!header || !toggle || !nav) return;

      const closeMenu = () => {
        header.classList.remove('nav-open');
        toggle.setAttribute('aria-expanded', 'false');
      };

      toggle.addEventListener('click', () => {
        const isOpen = header.classList.toggle('nav-open');
        toggle.setAttribute('aria-expanded', String(isOpen));
      });

      nav.querySelectorAll('a').forEach((link) => link.addEventListener('click', closeMenu));
      window.addEventListener('resize', () => {
        if (window.innerWidth > 860) closeMenu();
      });
    })();
  </script>

</body>
</html>
