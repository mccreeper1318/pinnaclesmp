<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Season 11 Gallery | Pinnacle SMP</title><link rel="stylesheet" href="assets/light-theme.css" />
<style>*{box-sizing:border-box}body{margin:0;color:var(--text);font-family:Inter,ui-sans-serif,system-ui;background:var(--bg-soft)}.site-header{position:sticky;top:0;z-index:20;background:var(--nav-bg);border-bottom:1px solid var(--nav-line);backdrop-filter:blur(10px)}.nav-wrap{width:min(calc(100% - 32px),1100px);margin:0 auto;min-height:72px;display:flex;align-items:center;justify-content:space-between;gap:14px}.brand{display:inline-flex;align-items:center;gap:10px;text-decoration:none;color:var(--text);font-weight:800}.brand-logo{width:42px;height:42px}.menu-toggle{display:none;border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:10px;padding:8px 12px;font-weight:600}.site-nav ul{list-style:none;display:flex;gap:10px;margin:0;padding:0}.nav-link{display:inline-flex;padding:10px 14px;border:1px solid transparent;border-radius:12px;color:var(--text);text-decoration:none}.nav-link:hover{background:var(--btn-secondary-bg);border-color:var(--line)}.container{width:min(calc(100% - 32px),1100px);margin:0 auto;padding:36px 0 54px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:28px;box-shadow:var(--shadow)}@media(max-width:860px){.menu-toggle{display:inline-flex}.site-nav{display:none;width:100%}.site-header.nav-open .site-nav{display:block}.site-nav ul{flex-direction:column}.nav-link{width:100%}}</style></head><body>
<header class="site-header"><div class="nav-wrap"><a href="index.html#home" class="brand"><img class="brand-logo" src="assets/branding/PinnacleSeason12Logo.svg" alt="Pinnacle SMP Season 12 logo" /><span>Pinnacle SMP</span></a><button class="menu-toggle" type="button" aria-expanded="false" aria-controls="mobile-nav">Menu</button><nav class="site-nav" id="mobile-nav" aria-label="Main navigation"><ul><li><a class="nav-link" href="index.html#home">Home</a></li><li><a class="nav-link" href="index.html#news">Server News</a></li><li><a class="nav-link" href="index.html#events">Events</a></li><li><a class="nav-link" href="index.html#rules">Server Rules</a></li><li><a class="nav-link" href="gallery.html">Gallery</a></li><li><a class="nav-link" href="index.html#join">Join</a></li></ul></nav></div></header>
<main class="container"><section class="panel"><h1>Season 11 Gallery</h1><p>A visual archive of community moments from Pinnacle SMP Season 11.</p><p id="gallery-status" class="gallery-status-message">Loading screenshots…</p><div id="season-gallery-grid" class="season-gallery-grid" aria-live="polite"></div></section></main>
<script>(()=>{const h=document.querySelector('.site-header');const t=document.querySelector('.menu-toggle');const n=document.getElementById('mobile-nav');if(h&&t&&n){const c=()=>{h.classList.remove('nav-open');t.setAttribute('aria-expanded','false')};t.addEventListener('click',()=>{const o=h.classList.toggle('nav-open');t.setAttribute('aria-expanded',String(o))});n.querySelectorAll('a').forEach((l)=>l.addEventListener('click',c));window.addEventListener('resize',()=>{if(window.innerWidth>860)c()});}
const cloudName='ds4p9jsuf';const tag='Season 11';const encodedTag=encodeURIComponent(tag);const listUrl=`https://res.cloudinary.com/${cloudName}/image/list/${encodedTag}.json`;const status=document.getElementById('gallery-status');const grid=document.getElementById('season-gallery-grid');
fetch(listUrl).then(r=>{if(!r.ok) throw new Error('Cloudinary gallery list failed to load.'); return r.json();}).then(data=>{const resources=Array.isArray(data.resources)?data.resources:[];if(resources.length===0){status.textContent='No screenshots have been added to this gallery yet.';return;}status.textContent='';resources.forEach((image)=>{const publicId=image.public_id;const format=image.format;if(!publicId||!format)return;const thumb=`https://res.cloudinary.com/${cloudName}/image/upload/w_500,h_350,c_fill,q_auto,f_auto/${publicId}.${format}`;const full=`https://res.cloudinary.com/${cloudName}/image/upload/w_1800,q_auto,f_auto/${publicId}.${format}`;const alt=publicId.replace(/[\/_-]+/g,' ').trim();const a=document.createElement('a');a.className='season-gallery-item';a.href=full;a.target='_blank';a.rel='noopener noreferrer';const img=document.createElement('img');img.src=thumb;img.alt=alt||'Season 11 screenshot';img.loading='lazy';a.appendChild(img);grid.appendChild(a);});if(!grid.children.length){status.textContent='No screenshots have been added to this gallery yet.';}}).catch((error)=>{status.textContent='Sorry, we could not load the Season 11 gallery right now. Please try again later.';console.error(error);});})();</script>
</body></html>
